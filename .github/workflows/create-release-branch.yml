name: Create release branch

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Define the release'     
        required: true

jobs:
  create-release-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Create Branch
        uses: vanbuiten/action-create-branch@v2.0.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          branch: 'release/${{ github.event.inputs.release_version }}'

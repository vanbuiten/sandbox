name: Sandbox action for testing stuff

on:
  workflow_dispatch:

jobs:
  sandbox:
    name: Testing stuff
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2

      - name: Setup Python 3.8
        uses: actions/setup-python@v1
        with:
          python-version: 3.8

      - name: Can I print this env variable in python?
        env:
          TEST_VAR: Do you see me?
        run: python sandbox.py

name: Build and commit Documentation in gh-pages branch

on:
  release:
    types: [ published ]

jobs:
  documentation:
    name: Build and commit Documentation in gh-pages branch
    runs-on: ubuntu-latest

    steps:
      # Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup python
      - name: Set up Python
        uses: actions/setup-python@v3
        with:
          python-version: '3.11'

      # Install Poetry
      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.7.1
          virtualenvs-create: true
          virtualenvs-in-project: true

      # Install dependencies
      - name: Install dependencies
        run: poetry --directory=backend/app install --with docs

      - name: Build documentation
        run: poetry --directory=backend/app run mkdocs build --clean --verbose

      # Add the CNAME file
      - name: Create CNAME file
        run: echo "sandbox.davidvanbuiten.nl" > site/CNAME

      # Deploy to GitHub Pages
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site

name: Update all requirements in a dependabot PR
on: pull_request

permissions:
  pull-requests: write
  issues: write
  repository-projects: write

jobs:
  dependabot:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]' || github.actor == 'vanbuiten'
    steps:
      - uses: actions/checkout@v4

      - name: Checkout source branch
        run: git checkout ${{ github.event.pull_request.source_branch }}

      - name: Update requirements
        run: make requirements

      - name: Commit and push changes
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          
          git add requirements.txt requirements_dev.txt
          git commit -m "Update requirements"
          git push origin HEAD:${{ github.event.pull_request.source_branch }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
